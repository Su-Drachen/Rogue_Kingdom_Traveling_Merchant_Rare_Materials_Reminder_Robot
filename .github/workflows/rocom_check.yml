name: Rocom Merchant Bot

on:
  schedule:
    # 建议每30分钟运行一次，或者保留你的关键时间点
    # 只要 Gist 里记录了该窗口已成功，多余的运行不会触发推送
    - cron: '5,55 * * * *'
  workflow_dispatch:

jobs:
  check_merchant:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install httpx

      - name: Run script
        env:
          MY_API_KEY: ${{ secrets.WEGAME_API_KEY }}
          MY_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK_URL }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: python main.py
